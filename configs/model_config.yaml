project: Rossmann Store Sales
best_model:
  name: RandomForestRegressor
  params:
    n_estimators: 300
    random_state: 42
    n_jobs: -1
  metrics_source: artifacts/metrics/metrics.json
features:
  input_columns:
    - StoreType
    - Assortment
    - StateHoliday
    - Promo
    - SchoolHoliday
    - Promo2
    - Is_Promo2_Month
    - Store
    - DayOfWeek
    - Month
    - Day
    - Year
    - WeekOfYear
    - CompetitionDistance
    - Promo2Open_Month
    - CompetitionOpen_Month
  target: log1p(Sales)
artifacts:
  model_file: artifacts/models/rossmann_model.joblib
  metrics_file: artifacts/metrics/metrics.json
