apiVersion: apps/v1
kind: Deployment
metadata:
  name: rossmann-api
  namespace: rossmann
  labels:
    app: rossmann-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rossmann-api
  template:
    metadata:
      labels:
        app: rossmann-api
    spec:
      containers:
        - name: api
          image: sales_forecasting_in_rossmann_retail_using_historical_sales_data-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PYTHONPATH
              value: /app/src
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rossmann-api
  namespace: rossmann
spec:
  selector:
    app: rossmann-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
